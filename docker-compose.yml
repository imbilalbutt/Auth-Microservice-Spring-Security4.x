

services:
  db:
    image: postgres:9.3
    container_name: auth-db-service
    restart: always

    #    Environment variables
    environment:
      POSTGRES_DB: db # name of database created by Docker in container
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    volumes:
      - auth-service-data:/var/lib/postgresql/data

    ports:
      #      - host port (my laptop) : container port
      - "5433:5432"

    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin_user -d db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for sessions (if using Redis)
  redis-service:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      redis-service:
        condition: service_healthy
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod
      
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      
      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      
      # Redis
      SPRING_DATA_REDIS_HOST: redis-service
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SESSION_STORE_TYPE: redis
      
      # JWT - MUST be overridden in production
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: 86400000
      
      # Session Security
      SESSION_COOKIE_SECURE: "false"
      
      # Server
      SERVER_PORT: 8081
      
      # Logging
      LOG_PATH: /app/logs
      THYMELEAF_CACHE: "true"
      
      # Rate Limiting
      RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
      RATE_LIMIT_BURST_CAPACITY: "10"
      RATE_LIMIT_MAX_LOGIN_ATTEMPTS: "5"
      RATE_LIMIT_LOCKOUT_DURATION_MINUTES: "30"
    networks:
      - internal
    volumes:
      - auth-service-logs:/app/logs

volumes:
  auth-service-data:
  auth-service-logs:

networks:
  internal:
    #    driver: bridge
    #     external: true tells Docker: "Don’t create this network — use an existing one named shared-internal."
    external: true
    name: shared-internal
