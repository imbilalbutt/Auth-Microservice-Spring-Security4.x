# Production Profile Configuration
spring.profiles.active=prod

# Database - Production (use environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA - Production (no auto-create, validated by Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway - Enabled for database migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Logging - Production level
logging.level.root=WARN
logging.level.com.imbilalbutt.springauthdev=INFO
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=WARN
logging.pattern.json=true

# Thymeleaf - Cache enabled for performance
spring.thymeleaf.cache=true

# Session Cookie - Secure for production (HTTPS required)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none

# JWT - MUST be set via environment variable in production
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# Redis - Production (use environment variables)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# HikariCP - Production tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000

# Rate Limiting - Strict for production
rate.limit.requests-per-minute=60
rate.limit.burst-capacity=10

# Actuator - Secure in production
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
