# Development Profile Configuration
spring.profiles.active=dev

# Database - Development
spring.datasource.url=jdbc:postgresql://localhost:5433/auth_service
spring.datasource.username=admin_user
spring.datasource.password=password

# JPA - Development (auto-create tables)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway - Disabled in dev (using Hibernate)
spring.flyway.enabled=false

# Logging - Verbose for development
logging.level.root=DEBUG
logging.level.com.imbilalbutt.springauthdev=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=DEBUG

# Thymeleaf - No cache for hot reload
spring.thymeleaf.cache=false

# Session Cookie - Insecure for local development
server.servlet.session.cookie.secure=false

# JWT - Development key (NOT for production)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Redis - Local development
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Rate Limiting - Relaxed for development
rate.limit.requests-per-minute=1000
rate.limit.burst-capacity=100
