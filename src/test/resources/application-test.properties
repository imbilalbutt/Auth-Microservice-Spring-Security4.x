# Test Configuration

# Database (H2 In-Memory for Tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT - Test Secret (shortened for testing)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# Redis (disable for unit tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.com.imbilalbutt.springauthdev=DEBUG
logging.level.org.springframework.security=DEBUG

# Server
server.port=0

# Rate Limiting (relaxed for tests)
rate.limit.max-login-attempts=5
rate.limit.lockout-duration-minutes=30
rate.limit.requests-per-minute=1000
rate.limit.burst-capacity=100

# Flyway (disable for tests)
spring.flyway.enabled=false